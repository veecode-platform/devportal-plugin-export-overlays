# Codecov configuration for E2E plugin coverage.
#
# E2E coverage collected from instrumented dynamic plugins is uploaded to this
# repo's Codecov project, one flag per workspace (e2e-<workspace>) — see
# scripts/upload-coverage.sh for the attribution model. The lcov references
# committed anchor files (workspaces/*/coverage-anchors/, one per plugin —
# Codecov only keeps paths that exist in the git tree), so only the per-flag
# percentage and trend are meaningful; line-level annotation is not available.
#
# Uploads come from PR presubmits (changed workspaces, PR-head commit). The
# nightly has the upload plumbing too (all workspaces, one flag each, main
# commit) but collects nothing yet: instrumented `__coverage` images are only
# built by the PR /publish flow and the e2e-test-utils image swap only runs
# in PR mode — until those land, the default-branch headline only moves when
# coverage is uploaded against a main commit manually.

codecov:
  require_ci_to_pass: false

coverage:
  status:
    # Coverage is informational only — never gate or fail PRs on it.
    project: off
    patch: off

# A PR run only exercises the changed workspace's E2E suite. Carry every other
# workspace's flag forward from the last commit that measured it, so the
# overall picture doesn't drop to a single flag on each upload.
flag_management:
  default_rules:
    carryforward: true

comment:
  layout: "flags"
  require_changes: false
