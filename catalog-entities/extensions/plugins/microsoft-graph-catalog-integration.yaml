# yaml-language-server: $schema=https://raw.githubusercontent.com/redhat-developer/rhdh-plugins/refs/heads/main/workspaces/extensions/json-schema/plugins.json
apiVersion: extensions.backstage.io/v1alpha1
kind: Plugin
metadata:
  name: microsoft-graph-catalog-integration
  namespace: rhdh
  title: Microsoft Entra Tenant Data Provider
  description: |
    This is an extension module to the `plugin-catalog-backend` plugin, providing a `MicrosoftGraphOrgEntityProvider`
    that can be used to ingest organization data from the Microsoft Graph API.
    This provider is useful if you want to import users and groups from Entra Id (formerly Azure Active Directory) or Office 365.
  annotations:
    extensions.backstage.io/pre-installed: 'true' # this means the plugin yaml is preinstalled, not the plugin itself, all other plugins are marked as 'custom'
  links:
    - title: readme
      url: https://github.com/backstage/backstage/blob/master/plugins/catalog-backend-module-msgraph/README.md
    - title: Homepage
      url: https://red.ht/rhdh
    - title: Issues
      url: https://github.com/backstage/backstage/issues
    - title: Documentation for Red Hat Developer Hub
      url: https://docs.redhat.com/en/documentation/red_hat_developer_hub/latest/html-single/authentication_in_red_hat_developer_hub/index
    - title: Source Code
      url: https://github.com/backstage/backstage/tree/master/plugins/catalog-backend-module-msgraph
    - title: Red Hat Developer Hub Life Cycle Support Policy
      url: https://access.redhat.com/support/policy/updates/developerhub
  tags:
    - software-catalog

spec:
  author: Backstage Community
  support:
    provider: Red Hat
    level: generally-available
  lifecycle: active
  publisher: Red Hat

  categories:
    - Software Catalog # One category will show up on the tile view
  highlights:
    - Ingest organization data from the Microsoft Graph API

  description: |
    This is an extension module to the `plugin-catalog-backend` plugin, providing a `MicrosoftGraphOrgEntityProvider`
    that can be used to ingest organization data from the Microsoft Graph API. This provider is useful if you want to
    import users and groups from Entra Id (formerly Azure Active Directory) or Office 365.

    ## Adding The Plugin To Red Hat Developer Hub

    See the [Red Hat Developer Hub documentation](https://docs.redhat.com/en/documentation/red_hat_developer_hub/latest/html/installing_and_viewing_plugins_in_red_hat_developer_hub/extensions-in-rhdh_plugins-in-rhdh)
    for further instructions on how to add, enable, configure, and remove plugins in your instance.

    ## Configuring The Plugin ##

    Plugins often need additional configuration to work correctly - particularly those that integrate with other
    systems. See the original source code repository, the software vendor, or the [Red Hat Developer Hub documentation](https://docs.redhat.com/en/documentation/red_hat_developer_hub/latest/html/installing_and_viewing_plugins_in_red_hat_developer_hub)
    for further details regarding the configuration required.

  packages:
    - backstage-plugin-catalog-backend-module-msgraph
