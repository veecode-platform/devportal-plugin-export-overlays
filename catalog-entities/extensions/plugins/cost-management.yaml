  namespace: rhdh
  title: Cost Management For Red Hat Developer Hub
  annotations:
    extensions.backstage.io/pre-installed: 'true'
  links:
    - title: Homepage
      url: https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/cost-management
