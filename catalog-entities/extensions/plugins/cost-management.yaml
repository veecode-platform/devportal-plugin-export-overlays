  description: |
    Cost Management brings Red Hat Insights OpenShift cost tracking and resource optimization recommendations into Backstage. View costs by cluster, project, node, or tag and apply optimization recommendations to your configured clusters.
spec:
  author: Red Hat
  support:
    provider: Red Hat
    level: tech-preview
  lifecycle: active
  publisher: Red Hat

  categories:
    - Automation
  highlights:
    - Track OpenShift costs grouped by cluster, project, node, or tag
    - Monitor month-over-month cost changes and spending patterns
    - Visualize resource usage trends and receive optimization recommendations
    - Automatically apply optimization recommendations via Orchestrator workflows

  description: |
    The Cost Management plugin consists of two main parts:

    ### OpenShift

    The OpenShift section displays cost tracking for OpenShift clusters with flexible grouping options. Users can view costs grouped by cluster, project, node, or tag, monitor month-over-month cost changes, and filter data to analyze spending patterns and identify cost trends.

    ### Optimizations

    The Optimizations section allows users to visualize usage trends and receive optimization recommendations for workloads running on OpenShift clusters. There is also an option to automatically apply recommendations via the Orchestrator plugin.

    The plugin consumes services from [Red Hat Hybrid Cloud Console](https://console.redhat.com/openshift/cost-management), therefore your clusters must be configured to access cost management data and optimization recommendations.

    ## Adding The Plugin To Red Hat Developer Hub

    See the [Red Hat Developer Hub documentation](https://docs.redhat.com/en/documentation/red_hat_developer_hub/latest/html/installing_and_viewing_plugins_in_red_hat_developer_hub/extensions-in-rhdh_plugins-in-rhdh) 
    for further instructions on how to add, enable, configure, and remove plugins in your instance.

    ## Configuring The Plugin ##

    Plugins often need additional configuration to work correctly - particularly those that integrate with other 
    systems. See the original source code repository, the software vendor, or the [Red Hat Developer Hub documentation](https://docs.redhat.com/en/documentation/red_hat_developer_hub/latest/html/installing_and_viewing_plugins_in_red_hat_developer_hub)
    for further details regarding the configuration required.

