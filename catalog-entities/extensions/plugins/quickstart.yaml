apiVersion: extensions.backstage.io/v1alpha1
kind: Plugin
metadata:
  name: quickstart
  namespace: rhdh
  title: Quickstart
  description: "Guided quickstarts to help users discover and set up key features in Red Hat Developer Hub."
  annotations:
    extensions.backstage.io/pre-installed: 'true' # this means the plugin yaml is preinstalled, not the plugin itself, all other plugins are marked as 'custom'
  tags:
    - onboarding
    - customization
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://issues.redhat.com/browse/RHDHBUGS
      title: "Report issues here. Note: Customers of Red Hat Developer Hub should raise a Red Hat support case instead."
    - title: Documentation for Red Hat Developer Hub
      url: https://docs.redhat.com/en/documentation/red_hat_developer_hub/latest/html/customizing_red_hat_developer_hub/customizing-the-quickstarts
    - title: Source Code
      url: https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/quickstart
spec:
  author: Red Hat
  support:
    provider: Red Hat
    level: generally-available
  lifecycle: active
  publisher: Red Hat

  categories:
    - Customization

  highlights:
    - Provide in-product quickstarts and guidance

  description: |
    Quickstart provides in-product, contextual onboarding flows that help users set up and discover
    features in Red Hat Developer Hub. It includes a help button in the global header and a drawer
    provider to surface guidance when needed.

    ## Adding The Plugin To Red Hat Developer Hub

    See the [Red Hat Developer Hub documentation](https://docs.redhat.com/en/documentation/red_hat_developer_hub/latest/html/installing_and_viewing_plugins_in_red_hat_developer_hub/extensions-in-rhdh_plugins-in-rhdh)
    for further instructions on how to add, enable, configure, and remove plugins in your instance.


  packages:
    - rhdh-bsp-quickstart


