name: Publish RHDH Release Dynamic Plugin Images 
on:
  workflow_call:
    secrets:
      QUAY_TOKEN:
        description: Quay.io robot account token for pushing OCI images
        required: true
      QUAY_API_TOKEN:
        description: Quay.io OAuth token for API operations (setting repo visibility)
        required: false

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    name: Prepare
    outputs:
      last-published-commit: ${{ steps.get-last-published-commit.outputs.last-published-commit }}

    steps:
      - name: Get last published commit
        id: get-last-published-commit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_RELEASE_BRANCH: ${{ github.ref_name }}      
        with:
          script: |
            core.info(`Getting latest commit on branch ${core.getInput('release_branch')}`);

            const currentRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const workflowId = currentRun.data.workflow_id;

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              branch: core.getInput('release_branch'),
              status: 'success',
              per_page: 10,
              exclude_pull_requests: true,
            });

            for (const run of runs.data.workflow_runs) {
              if ((context.payload.commits ?? []).some(c => c.id === run.head_sha)) {
                core.info(`Skipping run ${run.id} for commit ${run.head_sha}, it's part of the push`);
                continue;
              }

              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                filter: 'latest',
              });

              const exportJobs = jobs.data.jobs.filter(j => j.name.startsWith('export /'));
              if (exportJobs.length > 0 && exportJobs.every(j => j.conclusion === 'success')) {
                core.info(`Last published commit to compare with: ${run.head_sha}`);
                core.setOutput('last-published-commit', run.head_sha);
                return;
              }
              core.info(`Skipping run ${run.id} for commit ${run.head_sha}: export jobs not all successful`);
            }

            core.info('Last published commit not found');
            core.setOutput('last-published-commit', '');
            
  export:
    uses: veecode-platform/devportal-plugin-export-utils/.github/workflows/export-workspaces-as-dynamic.yaml@main
    needs:
      - prepare

    with:
      publish-container: true
      image-repository-prefix: quay.io/veecode
      last-publish-commit: ${{ needs.prepare.outputs.last-published-commit }}
      # use empty prefix so that we will prepend bs_1.yy.z__ instead of next__
      image-tag-prefix: ${{ '' }}
      image-registry-user: veecode+ci
      bundle-workspace: true

    secrets:
      image-registry-password: ${{ secrets.QUAY_TOKEN }}
      quay-api-token: ${{ secrets.QUAY_API_TOKEN }}

    permissions:
      contents: write
      attestations: write
      packages: write
      id-token: write

  publish-catalog-index:
    runs-on: ubuntu-latest
    name: Publish Catalog Index
    needs:
      - export

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read backstage version from versions.json
        id: versions
        run: |
          BS_VERSION=$(jq -r '.backstage' versions.json)
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%S)
          echo "backstage=$BS_VERSION" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

      - name: Assemble catalog index
        run: bash scripts/assemble-catalog-index.sh

      - name: Validate catalog index
        run: |
          YAML_COUNT=$(find catalog-entities/extensions -name '*.yaml' | wc -l)
          echo "Found $YAML_COUNT YAML files"
          if [ "$YAML_COUNT" -lt 50 ]; then
            echo "ERROR: expected at least 50 YAML files, got $YAML_COUNT"
            exit 1
          fi

      - name: Build OCI image
        run: |
          cd catalog-entities
          podman build -t plugin-catalog-index -f Containerfile .

      - name: Push to Quay.io
        env:
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
          BS_VERSION: ${{ steps.versions.outputs.backstage }}
          TIMESTAMP: ${{ steps.versions.outputs.timestamp }}
        # Versioned tags ONLY. The mutable `:latest` tag is a production
        # pointer consumed by deployed instances; it is promoted exclusively
        # by the human-approved promote-catalog-index-latest.yaml workflow.
        # Never re-add it here — an automatic retag from a branch whose
        # versions.json has moved would repoint every :latest consumer at an
        # unvalidated line (see CLAUDE.md § "Publish vs. promote").
        run: |
          podman login -u veecode+ci -p "$QUAY_TOKEN" quay.io
          IMAGE="quay.io/veecode/plugin-catalog-index"
          podman tag plugin-catalog-index "$IMAGE:bs_${BS_VERSION}"
          podman tag plugin-catalog-index "$IMAGE:bs_${BS_VERSION}_${TIMESTAMP}"
          podman push "$IMAGE:bs_${BS_VERSION}"
          podman push "$IMAGE:bs_${BS_VERSION}_${TIMESTAMP}"
          echo "Published $IMAGE with tags: bs_${BS_VERSION}, bs_${BS_VERSION}_${TIMESTAMP} (:latest is promotion-only)"

      - name: Set Quay repository to public
        env:
          QUAY_API_TOKEN: ${{ secrets.QUAY_API_TOKEN }}
        run: |
          if [ -z "$QUAY_API_TOKEN" ]; then
            echo "QUAY_API_TOKEN not set, skipping visibility change"
            exit 0
          fi
          curl -s -X PUT \
            -H "Authorization: Bearer $QUAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}' \
            "https://quay.io/api/v1/repository/veecode/plugin-catalog-index/changevisibility" || true
