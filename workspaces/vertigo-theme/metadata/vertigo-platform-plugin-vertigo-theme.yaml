apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  # Internal Vertigo platform theme — Package only, intentionally NO Plugin
  # catalog entity and NOT listed in catalog-entities/extensions/plugins/all.yaml.
  # It must NOT appear in the client marketplace. Same pattern as veecode-theme.
  name: vertigo-platform-plugin-vertigo-theme
  namespace: veecode
  title: "Vertigo Theme"
  links:
    - url: https://github.com/veecode-platform/devportal-plugins
      title: Source Repository
  annotations:
    backstage.io/source-location: url:https://github.com/veecode-platform/devportal-plugins/tree/main/workspaces/vertigo-theme
  tags: []
spec:
  packageName: "vertigo-platform-plugin-vertigo-theme"
  dynamicArtifact: oci://quay.io/veecode/vertigo-theme:bs_1.49.4!vertigo-platform-plugin-vertigo-theme
  version: 0.1.0
  # A theme carries no app-config; it is driven entirely by the dynamic-plugins
  # `themes:` / `mountPoints:` config. Opt out of the appConfigExamples check.
  appConfigNotRequired: true
  appConfigExamples: []
  backstage:
    role: frontend-plugin
    supportedVersions: 1.49.4
  author: VeeCode
  support: community
  lifecycle: active
  partOf:
    - vertigo-theme
