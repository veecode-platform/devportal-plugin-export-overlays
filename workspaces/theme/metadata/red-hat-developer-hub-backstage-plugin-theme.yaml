apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: red-hat-developer-hub-backstage-plugin-theme
  namespace: rhdh
  title: Theme
  links:
    - title: Source Code
      url: https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/theme
  annotations:
    backstage.io/source-location: url:https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/theme
  tags: []
spec:
  packageName: "@red-hat-developer-hub/backstage-plugin-theme"
  dynamicArtifact: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-theme:bs_1.49.4__0.14.5!red-hat-developer-hub-backstage-plugin-theme
  version: 0.14.5
  backstage:
    role: frontend-plugin
    supportedVersions: 1.49.4
  author: Red Hat
  support: community
  lifecycle: active
  appConfigExamples:
    - title: Default configuration
      content:
        dynamicPlugins:
          frontend:
            red-hat-developer-hub.backstage-plugin-theme:
              appIcons:
                - importName: LightIcon
                  name: lightIcon
                - importName: DarkIcon
                  name: darkIcon
              themes:
                - id: light-dynamic
                  icon: lightIcon
                  importName: lightThemeProvider
                  title: Light Dynamic
                  variant: light
                - icon: darkIcon
                  id: dark-dynamic
                  importName: darkThemeProvider
                  title: Dark Dynamic
                  variant: dark
