app:
  title: RHDH Roadie Plugins Test Instance for HTTP Request plugin
proxy:
  skipInvalidProxies: true
  endpoints:
    "/quay/api":
      target: https://quay.io/
      headers:
        X-Requested-With: "XMLHttpRequest"
      changeOrigin: true
      secure: true

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, Group, Resource, Location, Template, API]
  locations:
    - type: url
      target: https://github.com/redhat-developer/rhdh/blob/main/catalog-entities/all.yaml
    - type: url
      target: https://github.com/janus-qe/software-template/blob/main/test-http-request.yaml
