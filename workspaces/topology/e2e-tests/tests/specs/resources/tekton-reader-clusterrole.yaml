kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: topology-test-tekton-reader
rules:
  - apiGroups:
      - tekton.dev
    resources:
      - pipelines
      - pipelineruns
      - taskruns
    verbs:
      - get
      - list
  - apiGroups:
      - route.openshift.io
    resources:
      - routes
    verbs:
      - get
      - list
