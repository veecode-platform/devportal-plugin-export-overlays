plugins:
  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-dynamic-home-page
    enabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          red-hat-developer-hub.backstage-plugin-dynamic-home-page:
            dynamicRoutes:
              - path: /
                importName: DynamicCustomizableHomePage
            mountPoints:
              - mountPoint: home.page/cards
                importName: OnboardingSection
                config:
                  id: onboarding-section
                  title: Onboarding section
              - mountPoint: home.page/cards
                importName: EntitySection
                config:
                  id: entity-section
                  title: Entity section
              - mountPoint: home.page/cards
                importName: TemplateSection
                config:
                  id: template-section
                  title: Template section
              - mountPoint: home.page/cards
                importName: QuickAccessCard
                config:
                  id: quickaccess-card
                  title: Quick Access
              - mountPoint: home.page/cards
                importName: RecentlyVisitedCard
                config:
                  id: recently-visited-card
                  title: Recently visited
              - mountPoint: home.page/cards
                importName: TopVisitedCard
                config:
                  id: top-visited-card
                  title: Top visited
            translationResources:
              - importName: homepageTranslations
                ref: homepageTranslationRef
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-homepage-backend:bs_1.49.4__0.1.1!red-hat-developer-hub-backstage-plugin-homepage-backend
    enabled: true
    pluginConfig:
      homepage:
        defaultWidgets:
          - id: onboarding-section
            ref: onboarding-section
            props:
              title: Onboarding section
          - id: entity-section
            ref: entity-section
            props:
              title: Entity section
          - if:
              groups: [group:default/admins]
            children:
              - id: template-section
                ref: template-section
                props:
                  title: Template section
              - id: quickaccess-card
                ref: quickaccess-card
                props:
                  title: Quick Access
          - if:
              groups: [group:default/developers]
            children:
              - id: recently-visited
                ref: recently-visited-card
                props:
                  title: Recently Visited
              - id: top-visited
                ref: top-visited-card
                props:
                  title: Top Visited
