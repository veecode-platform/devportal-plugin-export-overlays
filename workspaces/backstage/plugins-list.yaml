# Curated allowlist: plugins already static in devportal-base or wrapped in
# devportal-distro are excluded. Upstream additions are not enrolled
# automatically; each new package needs a separate adoption decision.
#
# Removed (static in devportal-base):
#   auth: github, gitlab, google, microsoft, oidc, gcp-iap, oauth2-proxy
#   catalog: azure, github, github-org, gitlab, gitlab-org, ldap, msgraph
#   scaffolder: azure, github, gitlab, notifications
#   search: techdocs
#   other: home, kubernetes-backend, notifications, notifications-backend,
#          org, proxy-backend, signals, signals-backend, techdocs,
#          techdocs-backend, techdocs-module-addons-contrib,
#          events-backend-module-github
