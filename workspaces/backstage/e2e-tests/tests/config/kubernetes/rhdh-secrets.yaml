apiVersion: v1
kind: Secret
metadata:
  name: rhdh-secrets
type: Opaque
stringData:
  K8S_CLUSTER_NAME: $K8S_CLUSTER_NAME
  K8S_CLUSTER_URL: $K8S_CLUSTER_URL
  K8S_CLUSTER_TOKEN: $K8S_CLUSTER_TOKEN
  NODE_TLS_REJECT_UNAUTHORIZED: "0"
  VAULT_KEYCLOAK_ADMIN_USERNAME: $VAULT_KEYCLOAK_ADMIN_USERNAME
  VAULT_KEYCLOAK_ADMIN_PASSWORD: $VAULT_KEYCLOAK_ADMIN_PASSWORD
