plugins:
  - package: ./dynamic-plugins/dist/backstage-plugin-catalog-backend-module-gitlab-dynamic
    disabled: false
    pluginConfig:
      catalog:
        providers:
          gitlab:
            default:
              host: ${VAULT_EVENTS_GITLAB_HOST}
              group: ${VAULT_EVENTS_GITLAB_PARENT_ORG}
              schedule:
                initialDelay:
                  seconds: 15
                frequency:
                  hours: 24
                timeout:
                  minutes: 3
  - package: ./dynamic-plugins/dist/backstage-plugin-catalog-backend-module-gitlab-org-dynamic
    disabled: false
    pluginConfig:
      catalog:
        providers:
          gitlab:
            orgProvider:
              host: ${VAULT_EVENTS_GITLAB_HOST}
              group: ${VAULT_EVENTS_GITLAB_PARENT_ORG}
              orgEnabled: true
              schedule:
                initialDelay:
                  seconds: 15
                frequency:
                  hours: 24
                timeout:
                  minutes: 3
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-events-backend-module-gitlab:bs_1.49.4__0.3.10
    disabled: false
    pluginConfig:
      events:
        http:
          topics:
            - gitlab
        modules:
          gitlab:
            webhookSecret: ${VAULT_GITLAB_WEBHOOK_SECRET}
