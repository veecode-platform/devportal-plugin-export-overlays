apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: backstage-community-plugin-tech-insights
  namespace: rhdh
  title: Tech Insights
  links:
    - url: https://github.com/backstage/community-plugins/issues
      title: Bugs
    - title: Source Code
      url: https://github.com/backstage/community-plugins/tree/main/workspaces/tech-insights
  annotations:
    backstage.io/source-location: url:https://github.com/backstage/community-plugins/tree/main/workspaces/tech-insights
  tags: []
spec:
  packageName: "@backstage-community/plugin-tech-insights"
  dynamicArtifact: oci://quay.io/veecode/tech-insights:bs_1.49.4!backstage-community-plugin-tech-insights
  version: 1.2.0
  backstage:
    role: frontend-plugin
    supportedVersions: 1.49.4
  author: Backstage Community
  support: community
  lifecycle: active
  appConfigExamples:
    - title: Default configuration
      content:
        dynamicPlugins:
          frontend:
            backstage-community.plugin-tech-insights:
              dynamicRoutes:
                - path: /tech-insights
                  importName: TechInsightsScorecardPage
                  menuItem:
                    text: Tech Insights
              mountPoints:
                - mountPoint: entity.page.overview/cards
                  importName: EntityTechInsightsScorecardCard
                  config:
                    layout:
                      gridColumnEnd:
                        md: span 6
                        xs: span 12
                    props:
                      title: Tech Insights
