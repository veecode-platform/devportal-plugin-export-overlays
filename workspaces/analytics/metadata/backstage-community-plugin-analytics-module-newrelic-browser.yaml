  appConfigExamples:
    - title: Default configuration
      content:
        dynamicPlugins:
          frontend:
            backstage-community.plugin-analytics-module-newrelic-browser:
              apiFactories:
                - importName: newRelicAnalyticsApi
        app:
          analytics:
            newRelic:
              endpoint: ${NEWRELIC_ENDPOINT}
              accountId: ${NEWRELIC_ACCOUNT_ID}
              applicationId: ${NEWRELIC_APPLICATION_ID}
              licenseKey: ${NEWRELIC_LICENSE_KEY}
              distributedTracingEnabled: false
              cookiesEnabled: false
