  namespace: rhdh
  title: "Analytics Module Newrelic Browser"
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://github.com/backstage/community-plugins/issues
      title: Bugs
    - title: Source Code
      url: https://github.com/backstage/community-plugins/tree/main/workspaces/analytics/plugins/analytics-module-newrelic-browser
  annotations:
    backstage.io/source-location: url:https://github.com/backstage/community-plugins/tree/main/workspaces/analytics/plugins/analytics-module-newrelic-browser
  tags: []
spec:
  packageName: "@backstage-community/plugin-analytics-module-newrelic-browser"
  dynamicArtifact: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-analytics-module-newrelic-browser:bs_1.49.4__0.18.0!backstage-community-plugin-analytics-module-newrelic-browser
