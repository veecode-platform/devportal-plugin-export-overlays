apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: backstage-community-plugin-catalog-backend-module-pingidentity
  namespace: rhdh
  title: "Catalog Backend Module PingIdentity"
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://github.com/backstage/community-plugins/issues
      title: Bugs
    - title: Source Code
      url: https://github.com/backstage/community-plugins/tree/main/workspaces/pingidentity
  annotations:
    backstage.io/source-location: url:https://github.com/backstage/community-plugins/tree/main/workspaces/pingidentity
  tags:
    - software-catalog
spec:
  packageName: "@backstage-community/plugin-catalog-backend-module-pingidentity"
  dynamicArtifact: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-pingidentity-dynamic
  version: 0.11.1
  backstage:
    role: backend-plugin-module
    supportedVersions: 1.49.4
  author: Red Hat
  support: tech-preview
  lifecycle: active
  partOf:
    - pingidentity
  appConfigExamples:
    - title: PingOne org provider (regional API/auth URLs)
      content:
        catalog:
          providers:
            pingIdentityOrg:
              default:
                apiPath: ${PING_IDENTITY_API_BASE_URL}
                authPath: ${PING_IDENTITY_AUTH_BASE_URL}
                envId: ${PING_IDENTITY_ENV_ID}
                clientId: ${PING_IDENTITY_CLIENT_ID}
                clientSecret: ${PING_IDENTITY_CLIENT_SECRET}
                schedule:
                  frequency: { minutes: 30 }
                  timeout: { minutes: 10 }
                  initialDelay: { seconds: 15 }
