app:
  title: RHDH ArgoCD Test Instance

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: local-cluster
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          skipTLSVerify: true
  customResources:
    - group: "argoproj.io"
      apiVersion: "v1alpha1"
      plural: "rollouts"
    - group: "argoproj.io"
      apiVersion: "v1alpha1"
      plural: "analysisruns"

argocd:
  appLocatorMethods:
    - instances:
        - name: argoInstance1
          password: ${ARGOCD_PASSWORD}
          url: ${ARGOCD_INSTANCE1_URL}
          username: admin
      type: config

catalog:
  locations:
    - type: url
      target: https://github.com/janus-qe/RHDH-ArgoCD-plugin-test/blob/main/catalog-info.yaml
      rules:
        - allow: [Component]
