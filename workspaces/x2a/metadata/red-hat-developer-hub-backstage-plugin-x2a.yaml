apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: red-hat-developer-hub-backstage-plugin-x2a
  namespace: rhdh
  title: "X2A"
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://github.com/redhat-developer/rhdh-plugins/issues
      title: Bugs
    - title: Source Code
      url: https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/x2a
  tags: []
spec:
  packageName: "@red-hat-developer-hub/backstage-plugin-x2a"
  dynamicArtifact: oci://quay.io/veecode/x2a:bs_1.49.4!red-hat-developer-hub-backstage-plugin-x2a
  version: 1.2.2
  backstage:
    role: frontend-plugin
    supportedVersions: 1.49.4
  author: Red Hat
  support: community
  lifecycle: active
  appConfigExamples:
    - title: Default configuration
      content:
        dynamicPlugins:
          frontend:
            red-hat-developer-hub.backstage-plugin-x2a:
              translationResources:
                - importName: x2aPluginTranslations
                  ref: x2aPluginTranslationRef
              appIcons:
                - name: x2aIcon
                  importName: X2AIcon
              dynamicRoutes:
                - path: /x2a
                  importName: X2APage
                  menuItem:
                    icon: x2aIcon
                    text: X2A
