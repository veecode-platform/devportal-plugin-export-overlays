kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: local-cluster
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          skipTLSVerify: true
  customResources:
    - apiVersion: "v1beta1"
      group: "tekton.dev"
      plural: "pipelines"
    - apiVersion: v1beta1
      group: tekton.dev
      plural: pipelineruns
    - apiVersion: v1beta1
      group: tekton.dev
      plural: taskruns
catalog:
  locations:
    - type: url
      target: https://github.com/janus-qe/nationalparks-py/blob/master/catalog-info.yaml
  rules:
    - allow: [Component, API, Location, Resource, System, Template, User, Group]
