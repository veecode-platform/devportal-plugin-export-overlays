upstream:
  backstage:
    extraVolumeMounts:
      # NOTE: Lists will not be merged with the default values file. So need to append all the defaults if you want to add a new item here
      # See https://issues.redhat.com/browse/RHDHPLAN-869
      # The initContainer below will install dynamic plugins in this volume mount.
      - name: dynamic-plugins-root
        mountPath: /opt/app-root/src/dynamic-plugins-root
      - name: extensions-catalog
        mountPath: /extensions
      - name: temp
        mountPath: /tmp
    extraEnvVars:
      - name: BACKEND_SECRET
        valueFrom:
          secretKeyRef:
            key: backend-secret
            name: '{{ include "rhdh.backend-secret-name" $ }}'
      - name: POSTGRESQL_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            key: postgres-password
            name: '{{- include "rhdh.postgresql.secretName" . }}'
      - name: NODE_ENV
        value: "development"
      - name: RHDH_EXTENSIONS_INSTALL_EXPORT_PATH
        value: /opt/app-root/src/dynamic-plugins-root/extensions-install-state.yaml
    extraVolumes:
      # NOTE: Lists will not be merged with the default values file. So need to append all the defaults if you want to add a new item here
      # See https://issues.redhat.com/browse/RHDHPLAN-869
      # -- Ephemeral volume that will contain the dynamic plugins installed by the initContainer below at start.
      # To have more control on underlying storage, the [emptyDir](https://docs.openshift.com/container-platform/4.13/storage/understanding-ephemeral-storage.html)
      # could be changed to a [generic ephemeral volume](https://docs.openshift.com/container-platform/4.13/storage/generic-ephemeral-vols.html#generic-ephemeral-vols-procedure_generic-ephemeral-volumes).
      - name: dynamic-plugins-root
        emptyDir: {}
      # Volume that will expose the `dynamic-plugins.yaml` file from the `dynamic-plugins` config map.
      # The `dynamic-plugins` config map is created by the helm chart from the content of the `global.dynamic` field.
      - name: dynamic-plugins
        configMap:
          defaultMode: 420
          name: '{{ printf "%s-dynamic-plugins" .Release.Name }}'
          optional: true
      # Optional volume that allows exposing the `.npmrc` file (through a `dynamic-plugins-npmrc` secret)
      # to be used when running `npm pack` during the dynamic plugins installation by the initContainer.
      - name: dynamic-plugins-npmrc
        secret:
          defaultMode: 420
          optional: true
          secretName: '{{ printf "%s-dynamic-plugins-npmrc" .Release.Name }}'
      - name: dynamic-plugins-registry-auth
        secret:
          defaultMode: 416
          optional: true
          secretName: '{{ printf "%s-dynamic-plugins-registry-auth" .Release.Name }}'
      - name: npmcacache
        emptyDir: {}
      # -- Ephemeral volume used by the install-dynamic-plugins init container to extract catalog entities from the catalog index image.
      # Mounted at the /extensions path in the backstage-backend main container for automatic discovery by the extension catalog backend providers.
      - name: extensions-catalog
        emptyDir: {}
      - name: temp
        emptyDir: {}
    # Helm replaces the whole initContainers list when set — mirror the chart default
    # (charts/backstage/values.yaml) plus a tiny follow-up init that seeds the file the
    # extensions backend expects (FileInstallationStorage requires an existing file with
    # a valid `plugins` list; see rhdh-plugins extensions-backend FileInstallationStorage).
    initContainers:
      - name: install-dynamic-plugins
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 2.5Gi
            ephemeral-storage: 5Gi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          seccompProfile:
            type: "RuntimeDefault"
        image: '{{ include "backstage.image" . }}'
        command:
          - ./install-dynamic-plugins.sh
          - /dynamic-plugins-root
        env:
          - name: NPM_CONFIG_USERCONFIG
            value: /opt/app-root/src/.npmrc.dynamic-plugins
          - name: MAX_ENTRY_SIZE
            value: "40000000"
          - name: CATALOG_INDEX_IMAGE
            value: "{{ .Values.global.catalogIndex.image.registry }}/{{ .Values.global.catalogIndex.image.repository }}:{{ .Values.global.catalogIndex.image.tag }}"
          - name: CATALOG_ENTITIES_EXTRACT_DIR
            value: "/extensions"
        imagePullPolicy: Always
        volumeMounts:
          - mountPath: /dynamic-plugins-root
            name: dynamic-plugins-root
          - mountPath: /opt/app-root/src/dynamic-plugins.yaml
            name: dynamic-plugins
            readOnly: true
            subPath: dynamic-plugins.yaml
          - mountPath: /opt/app-root/src/.npmrc.dynamic-plugins
            name: dynamic-plugins-npmrc
            readOnly: true
            subPath: .npmrc
          - mountPath: /opt/app-root/src/.config/containers
            name: dynamic-plugins-registry-auth
            readOnly: true
          - mountPath: /opt/app-root/src/.npm/_cacache
            name: npmcacache
          - name: extensions-catalog
            mountPath: /extensions
          - name: temp
            mountPath: /tmp
        workingDir: /opt/app-root/src
      - name: seed-extensions-installation-storage
        image: '{{ include "backstage.image" . }}'
        command: ["/bin/sh", "-c"]
        args:
          - "test -f /dynamic-plugins-root/extensions-install-state.yaml || echo 'plugins: []' > /dynamic-plugins-root/extensions-install-state.yaml"
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          seccompProfile:
            type: "RuntimeDefault"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
          - mountPath: /dynamic-plugins-root
            name: dynamic-plugins-root
