apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: veecode-platform-backstage-plugin-github-workflows-backend
  namespace: veecode
  title: "GitHub Workflows Backend"
  links:
    - url: https://github.com/veecode-platform/devportal-plugins
      title: Source Repository
  annotations:
    backstage.io/source-location: url:https://github.com/veecode-platform/devportal-plugins/tree/main/workspaces/github-workflows
  tags: []
spec:
  packageName: "@veecode-platform/backstage-plugin-github-workflows-backend"
  dynamicArtifact: oci://quay.io/veecode/github-workflows:bs_1.49.4!veecode-platform-backstage-plugin-github-workflows-backend
  version: 1.3.7
  backstage:
    role: backend-plugin
    supportedVersions: 1.49.4
  author: VeeCode
  support: community
  lifecycle: active
  partOf:
    - github-workflows
  appConfigExamples:
    - title: GitHub integration (GitHub App)
      content:
        integrations:
          github:
            - host: github.com
              apps:
                - appId: ${GITHUB_APP_ID}
                  clientId: ${GITHUB_CLIENT_ID}
                  clientSecret: ${GITHUB_CLIENT_SECRET}
                  privateKey: |
                    ${GITHUB_PRIVATE_KEY}
