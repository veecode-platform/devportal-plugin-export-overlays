# Applied with envsubst before deploy. Keys must match charts/backstage/files/lightspeed/secret.yaml.
# The Lightspeed Core sidecar loads this secret (see value_file.yaml global.lightspeed.secret).
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-secrets
type: Opaque
stringData:
  ENABLE_VLLM: "true"
  ENABLE_VERTEX_AI: ""
  ENABLE_OPENAI: "true"
  ENABLE_OLLAMA: ""
  ENABLE_VALIDATION: ""
  VLLM_URL: $VAULT_VLLM_URL
  VLLM_API_KEY: $VAULT_VLLM_API_KEY
  VLLM_MAX_TOKENS: ""
  VLLM_TLS_VERIFY: ${VAULT_VLLM_TLS_VERIFY:-true}
  NOTEBOOK_DEFAULT_MODEL: ${NOTEBOOK_DEFAULT_MODEL:-gpt-4o-mini}
  NOTEBOOK_PROVIDER: ${NOTEBOOK_PROVIDER:-openai}
  OPENAI_API_KEY: $VAULT_OPENAI_API_KEY
  VERTEX_AI_PROJECT: ""
  VERTEX_AI_LOCATION: ""
  GOOGLE_APPLICATION_CREDENTIALS: ""
  OLLAMA_URL: ""
  VALIDATION_PROVIDER: ""
  VALIDATION_MODEL_NAME: ""
  LLAMA_STACK_LOGGING: ""
