catalog:
  rules:
    - allow:
        [
          API,
          Component,
          User,
          Group,
          Location,
          Resource,
          System,
          Template,
          Plugin,
          Package,
        ]
  locations:
    # Scorecard test entities
    - type: url
      target: https://github.com/janus-qe/overlay-scorecard-plugin-test/blob/main/all-scorecards.yaml
    - type: url
      target: https://github.com/janus-qe/overlay-scorecard-plugin-test/blob/main/jira-scorecard-only.yaml
    - type: url
      target: https://github.com/janus-qe/overlay-scorecard-plugin-test/blob/main/github-scorecard-only.yaml
    - type: url
      target: https://github.com/janus-qe/overlay-scorecard-plugin-test/blob/main/no-scorecards.yaml
    - type: url
      target: https://github.com/janus-qe/overlay-scorecard-plugin-test/blob/main/metrics-unavailable.yaml
    - type: url
      target: https://github.com/janus-qe/overlay-scorecard-plugin-test/blob/main/invalid-threshold.yaml
    - type: url
      target: https://github.com/janus-qe/overlay-scorecard-plugin-test/blob/main/openssf-scorecard-only.yaml
    - type: url
      target: https://github.com/janus-qe/overlay-scorecard-plugin-test/blob/main/dependabot-scorecard-only.yaml

permission:
  enabled: true
  rbac:
    # policies-csv-file: /Users/dsantra/Documents/rhdh/rbac-policy.csv
    pluginsWithPermission:
      - catalog
      - permission
      - scorecard
    admin:
      superUsers:
        - name: user:default/test1
      users:
        - name: user:default/test1

integrations:
  # Plugin: GitHub
  github:
    - host: github.com
      apps:
        - appId: ${GITHUB_APP_APP_ID}
          clientId: ${GITHUB_APP_CLIENT_ID}
          clientSecret: ${GITHUB_APP_CLIENT_SECRET}
          webhookUrl: ${GITHUB_APP_WEBHOOK_URL}
          webhookSecret: ${GITHUB_APP_WEBHOOK_SECRET}
          privateKey: |
            ${GITHUB_APP_PRIVATE_KEY}
